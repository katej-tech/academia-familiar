<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Academia Familiar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Space+Grotesk:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --kid-ink:#1E2A4A; --kid-yellow:#FFC93C; --kid-green:#3EC97C; --kid-blue:#3B82F6; --kid-red:#FF6B6B; --kid-purple:#A78BFA;
  --teen-bg:#0F0D1A; --teen-card:#1C1830; --teen-violet:#8B5CF6; --teen-pink:#EC4899; --teen-cyan:#22D3EE; --teen-ink:#F4F1FF; --teen-mut:#9D95BD;
  --par-bg:#F4F6FA; --par-ink:#1F2A44; --par-acc:#0E9488; --par-line:#E2E8F0; --par-mut:#5B6B85;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:clamp(17px,4.4vw,22px)}
body{font-family:'Nunito',sans-serif;background:var(--par-bg);color:var(--par-ink);min-height:100dvh;overflow-x:hidden}
#app{max-width:640px;margin:0 auto;min-height:100dvh;padding:max(12px,3vw) max(14px,4vw) 40px;position:relative}
button{font-family:inherit;cursor:pointer;border:none;font-size:1rem;color:inherit}
input{font-family:inherit;font-size:1rem}
.hidden{display:none!important}
.center{text-align:center}

/* ================= TEMA NIÑO: mundo de juego ================= */
body.kid{font-family:'Fredoka',sans-serif;color:var(--kid-ink);
  background:linear-gradient(180deg,#5BC0F8 0%,#8ED9F5 45%,#BDF0D8 100%);background-attachment:fixed}
body.kid .card{background:#FFFEF8;border:4px solid var(--kid-ink);border-radius:26px;box-shadow:0 8px 0 rgba(30,42,74,.85);padding:20px;margin-bottom:18px}
.kbtn{display:block;width:100%;min-height:68px;padding:16px 20px;border-radius:22px;border:4px solid var(--kid-ink);
  box-shadow:0 8px 0 var(--kid-ink);font-family:'Fredoka';font-weight:700;font-size:1.35rem;color:var(--kid-ink);
  background:var(--kid-yellow);transition:transform .07s,box-shadow .07s;margin-bottom:16px;text-align:center;line-height:1.2}
.kbtn:active{transform:translateY(6px);box-shadow:0 2px 0 var(--kid-ink)}
.kbtn.blue{background:var(--kid-blue);color:#fff}
.kbtn.green{background:var(--kid-green);color:#fff}
.kbtn.red{background:var(--kid-red);color:#fff}
.kbtn.purple{background:var(--kid-purple);color:#fff}
.kbtn.white{background:#fff}

/* Mapa de aventura */
.map{position:relative;padding:10px 0 30px}
.map::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:8px;transform:translateX(-50%);
  background:repeating-linear-gradient(180deg,rgba(255,255,255,.9) 0 18px,transparent 18px 34px);border-radius:8px}
.node{position:relative;width:clamp(96px,26vw,120px);height:clamp(96px,26vw,120px);border-radius:50%;border:5px solid var(--kid-ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 34px;
  box-shadow:0 9px 0 rgba(30,42,74,.85);font-family:'Fredoka';font-weight:700;background:#fff;z-index:1}
.node .ic{font-size:clamp(2.1rem,7vw,2.6rem);line-height:1}
.node .nm{font-size:.72rem;margin-top:2px}
.node.left{transform:translateX(min(-78px,-21vw))}
.node.right{transform:translateX(max(78px,21vw))}
@media(min-width:600px){.node.left{transform:translateX(-130px)}.node.right{transform:translateX(130px)}}
.node.open{background:var(--kid-yellow)}
.node.open:active{box-shadow:0 2px 0 rgba(30,42,74,.85)}
.node.locked{background:#D7DCE6;opacity:.85;filter:saturate(.4)}
.node.done{background:var(--kid-green);color:#fff}
.node .stars{position:absolute;bottom:-16px;font-size:1rem;letter-spacing:-2px;text-shadow:0 2px 0 rgba(0,0,0,.25)}
.node.current::after{content:"¡JUEGA!";position:absolute;top:-26px;background:var(--kid-red);color:#fff;
  font-size:.7rem;padding:4px 12px;border-radius:999px;border:3px solid var(--kid-ink);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* Globos */
#sky{position:relative;height:56vh;min-height:340px;border-radius:26px;overflow:hidden;
  background:linear-gradient(180deg,#3B82F6,#7DD3FC);border:4px solid var(--kid-ink);box-shadow:0 8px 0 rgba(30,42,74,.85)}
.balloon{position:absolute;bottom:-150px;width:96px;height:118px;border-radius:50% 50% 48% 48%;
  display:flex;align-items:center;justify-content:center;font-family:'Fredoka';font-weight:700;font-size:1.7rem;color:#fff;
  border:4px solid rgba(0,0,0,.25);animation:rise linear forwards;text-shadow:0 2px 0 rgba(0,0,0,.3);cursor:pointer}
.balloon::after{content:"";position:absolute;bottom:-26px;left:50%;width:3px;height:26px;background:rgba(255,255,255,.8)}
@keyframes rise{from{bottom:-150px}to{bottom:110%}}
.balloon.pop{animation:pop .3s forwards!important}
@keyframes pop{to{transform:scale(2.2);opacity:0}}
.balloon.shake{animation-play-state:paused;animation:none;outline:none}
@keyframes shakeX{0%,100%{margin-left:0}25%{margin-left:-10px}75%{margin-left:10px}}

/* Memoria */
.memgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.mem{aspect-ratio:3/3.4;perspective:600px;cursor:pointer}
.mem .in{position:relative;width:100%;height:100%;transition:transform .35s;transform-style:preserve-3d}
.mem.flip .in{transform:rotateY(180deg)}
.mem .f,.mem .b{position:absolute;inset:0;border-radius:18px;border:4px solid var(--kid-ink);
  display:flex;align-items:center;justify-content:center;backface-visibility:hidden;font-family:'Fredoka';font-weight:700;
  font-size:1.05rem;text-align:center;padding:6px;box-shadow:0 5px 0 rgba(30,42,74,.7)}
.mem .f{background:var(--kid-blue);color:#fff;font-size:2rem}
.mem .b{background:#fff;transform:rotateY(180deg)}
.mem.ok .b{background:var(--kid-green);color:#fff}



/* Robot */
.robotgrid{display:grid;gap:8px;margin:14px 0}
.robotgrid .cell{aspect-ratio:1;border-radius:16px;background:rgba(255,255,255,.85);border:3px solid var(--kid-ink);
  display:flex;align-items:center;justify-content:center;font-size:2rem}
.cmdrow{display:flex;flex-wrap:wrap;gap:8px;min-height:58px;padding:10px;border-radius:18px;background:rgba(255,255,255,.7);border:3px dashed var(--kid-ink);margin-bottom:12px}
.cmd{font-size:1.6rem;padding:4px 10px;border-radius:12px;background:#fff;border:3px solid var(--kid-ink)}
.cmdbtns{display:flex;gap:10px;margin-bottom:12px}
.cmdbtns button{flex:1;font-size:1.9rem;padding:14px;border-radius:18px;border:4px solid var(--kid-ink);background:var(--kid-blue);color:#fff;box-shadow:0 6px 0 var(--kid-ink)}
.cmdbtns button:active{transform:translateY(4px);box-shadow:0 2px 0 var(--kid-ink)}

/* ================= TEMA TEEN ================= */
body.teen{background:radial-gradient(1100px 500px at 80% -10%,#3A1D6E 0%,var(--teen-bg) 55%);background-attachment:fixed;
  color:var(--teen-ink);font-family:'Space Grotesk',sans-serif}
body.teen .card{background:var(--teen-card);border:1px solid #322B52;border-radius:20px;padding:20px;margin-bottom:16px}
.tbtn{display:block;width:100%;min-height:62px;padding:16px 18px;border-radius:16px;font-weight:600;font-size:1.1rem;
  background:var(--teen-card);color:var(--teen-ink);border:1px solid #3A3360;margin-bottom:12px;text-align:left;transition:transform .08s,border-color .15s}
.tbtn:active{transform:scale(.98)}
.tbtn.acc{background:linear-gradient(120deg,var(--teen-violet),var(--teen-pink));border:none;color:#fff;text-align:center;font-weight:700}
.tbtn.cyan{border-color:var(--teen-cyan);color:var(--teen-cyan)}
.tbtn.opt{font-size:1.15rem}
body.teen .mut{color:var(--teen-mut)}
.eq{display:flex;align-items:flex-end;gap:4px;height:30px}
.eq i{width:6px;border-radius:3px;background:linear-gradient(180deg,var(--teen-pink),var(--teen-violet));animation:eq 1s infinite ease-in-out}
.eq i:nth-child(2){animation-delay:.15s}.eq i:nth-child(3){animation-delay:.3s}.eq i:nth-child(4){animation-delay:.45s}.eq i:nth-child(5){animation-delay:.6s}
@keyframes eq{0%,100%{height:30%}50%{height:100%}}
.word{cursor:pointer;border-bottom:2px dashed var(--teen-cyan);border-radius:3px;padding:0 1px}
.word:active,.word.tapped{background:rgba(34,211,238,.2)}
.timerbar{height:10px;border-radius:999px;background:#2B2547;overflow:hidden;margin:8px 0 14px}
.timerbar>div{height:100%;background:linear-gradient(90deg,var(--teen-cyan),var(--teen-violet));transition:width .25s linear}
.combo{position:fixed;top:64px;right:14px;background:linear-gradient(120deg,var(--teen-violet),var(--teen-pink));color:#fff;
  font-weight:700;padding:8px 16px;border-radius:999px;font-size:1.05rem;z-index:50;animation:pulse .6s}
.flash{perspective:800px;height:300px;margin-bottom:14px}
.flash .in{position:relative;width:100%;height:100%;transition:transform .4s;transform-style:preserve-3d;cursor:pointer}
.flash.flip .in{transform:rotateY(180deg)}
.flash .f,.flash .b{position:absolute;inset:0;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  backface-visibility:hidden;padding:20px;text-align:center}
.flash .f{background:linear-gradient(140deg,#2A2350,#1C1830);border:1px solid #3A3360;font-size:2.1rem;font-weight:700}
.flash .b{background:linear-gradient(140deg,var(--teen-violet),var(--teen-pink));transform:rotateY(180deg);font-size:1.7rem;font-weight:700;color:#fff}
.flash .hint{font-size:.85rem;color:var(--teen-mut);margin-top:14px;font-weight:400}
.flash .b .hint{color:rgba(255,255,255,.8)}

/* ================= TEMA PADRE ================= */
body.parent .card{background:#fff;border:1px solid var(--par-line);border-radius:14px;padding:18px;margin-bottom:16px}
.pbtn{display:inline-block;padding:12px 18px;border-radius:10px;font-weight:800;background:var(--par-acc);color:#fff;margin:4px 8px 4px 0;font-size:.95rem}
.pbtn.ghost{background:#fff;color:var(--par-ink);border:1px solid var(--par-line)}
.pbtn.danger{background:#DC2626}
body.parent table{width:100%;border-collapse:collapse;font-size:.85rem}
body.parent th,body.parent td{padding:9px 6px;text-align:left;border-bottom:1px solid var(--par-line)}
body.parent th{color:var(--par-mut);font-weight:800;font-size:.72rem;text-transform:uppercase}
.mut{color:var(--par-mut)}
.tag{display:inline-block;padding:3px 10px;border-radius:7px;font-size:.78rem;font-weight:800;background:rgba(14,148,136,.12);color:var(--par-acc)}
.barchart{display:flex;align-items:flex-end;gap:7px;height:120px;margin-top:10px}
.barchart .bar{flex:1;background:var(--par-acc);border-radius:7px 7px 0 0;min-height:4px;position:relative}
.barchart .bar span{position:absolute;bottom:-22px;left:0;right:0;text-align:center;font-size:.62rem;color:var(--par-mut)}
input[type=text],input[type=password],input[type=number]{width:100%;padding:14px;border-radius:12px;border:2px solid rgba(127,127,127,.35);background:transparent;color:inherit;margin-bottom:12px;font-size:1rem}

/* ================= COMUNES ================= */
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:999px;font-weight:800;font-size:1rem}
body.kid .pill{background:#fff;border:4px solid var(--kid-ink);box-shadow:0 4px 0 rgba(30,42,74,.8);font-family:'Fredoka'}
body.teen .pill{background:var(--teen-card);border:1px solid #3A3360}
body.parent .pill{background:#fff;border:1px solid var(--par-line)}
.back{font-size:1.6rem;background:none;font-weight:800;padding:6px 12px;border-radius:12px}
body.kid .back{background:#fff;border:4px solid var(--kid-ink);box-shadow:0 4px 0 rgba(30,42,74,.8)}
body.teen .back{background:var(--teen-card);border:1px solid #3A3360}
h1.title{font-size:1.7rem;line-height:1.2;margin-bottom:6px}
.bigq{font-size:1.5rem;font-weight:800;margin:8px 0 18px;line-height:1.3}
body.teen .bigq{font-weight:700;font-size:1.25rem}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:60;padding:16px 26px;border-radius:20px;
  font-weight:800;font-size:1.3rem;text-align:center;min-width:70%;animation:toastIn .25s}
@keyframes toastIn{from{transform:translate(-50%,30px);opacity:0}}
.toast.ok{background:var(--kid-green);color:#fff;border:4px solid #1E2A4A}
.toast.no{background:var(--kid-red);color:#fff;border:4px solid #1E2A4A}
body.teen .toast.ok{background:#16A34A;border:none}
body.teen .toast.no{background:#DC2626;border:none}
.confetti{position:fixed;top:-40px;z-index:70;font-size:1.6rem;animation:fall linear forwards;pointer-events:none}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
.endcard{text-align:center;padding:34px 22px!important}
.endcard .big{font-size:4.5rem;line-height:1;margin-bottom:8px}
.endcard h2{font-size:1.6rem;margin-bottom:6px}
.progressdots{display:flex;gap:8px;justify-content:center;margin:8px 0 16px}
.progressdots i{width:14px;height:14px;border-radius:50%;background:rgba(0,0,0,.18)}
body.teen .progressdots i{background:#332C55}
.progressdots i.on{background:var(--kid-green)}
body.teen .progressdots i.on{background:var(--teen-cyan)}
.misionrow{display:flex;align-items:center;gap:12px;padding:9px 0;font-weight:700;font-size:1.02rem}
.misionrow .chk{width:30px;height:30px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;border:3px solid currentColor;font-size:1rem}
.misionrow.done{opacity:.8}
.misionrow.done .chk{background:var(--kid-green);border-color:var(--kid-green);color:#fff}
.profilecard{text-align:center;padding:26px!important;cursor:pointer}
.profilecard .av{font-size:3.6rem;display:block;margin-bottom:8px}
.tip{font-size:.85rem;opacity:.85;margin-top:10px;line-height:1.45}
.spin{display:inline-block;animation:spinA 1s linear infinite}
@keyframes spinA{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ===== Botón de audio grande ===== */
.speaker{display:inline-flex;align-items:center;justify-content:center;gap:10px;width:100%;min-height:clamp(74px,18vw,92px);
  border-radius:24px;border:4px solid var(--kid-ink);background:var(--kid-blue);color:#fff;box-shadow:0 8px 0 var(--kid-ink);
  font-family:'Fredoka';font-weight:700;font-size:clamp(1.2rem,5vw,1.5rem);margin-bottom:16px;transition:transform .07s,box-shadow .07s}
.speaker:active{transform:translateY(6px);box-shadow:0 2px 0 var(--kid-ink)}
.speaker .ic{font-size:clamp(1.8rem,7vw,2.3rem);animation:wobble 1.6s ease-in-out infinite}
@keyframes wobble{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
.speaker.small{min-height:54px;font-size:1.1rem;width:auto;padding:0 22px;display:inline-flex;margin:0 0 12px}

/* ===== Escena de cuento ilustrado ===== */
.scene{font-size:clamp(3.4rem,16vw,5.5rem);text-align:center;line-height:1.1;padding:18px;
  background:linear-gradient(180deg,#FFF7E0,#FFEDD0);border-radius:22px;border:4px solid var(--kid-ink);margin-bottom:14px;
  min-height:120px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px}
.storytext{font-size:clamp(1.25rem,5.3vw,1.6rem);line-height:1.85;font-family:'Fredoka';font-weight:500}
.storytext b{background:#FFE38A;padding:0 4px;border-radius:6px}

/* ===== Inglés: tarjeta con imagen ===== */
.encard{text-align:center;padding:clamp(20px,6vw,34px)!important}
.encard .pic{font-size:clamp(4.5rem,22vw,7rem);line-height:1;margin-bottom:8px}
.encard .en{font-size:clamp(2.2rem,9vw,3rem);font-weight:700;color:var(--kid-blue);font-family:'Fredoka'}
.encard .es{font-size:clamp(1.2rem,5vw,1.5rem);color:var(--kid-ink);opacity:.7;margin-top:4px}
.choices2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.choices2 .kbtn{margin-bottom:0;min-height:clamp(80px,22vw,108px);font-size:clamp(1.3rem,6vw,1.7rem)}
.bigpic{font-size:clamp(4rem,20vw,6.5rem);text-align:center;line-height:1;margin:6px 0 14px}

/* ===== Teclado de letras ===== */
.letterslots{display:flex;gap:8px;justify-content:center;margin:14px 0;flex-wrap:wrap}
.slot{width:clamp(44px,12vw,58px);height:clamp(54px,14vw,68px);border-radius:14px;border:4px dashed var(--kid-ink);
  display:flex;align-items:center;justify-content:center;font-family:'Fredoka';font-weight:700;font-size:clamp(1.6rem,7vw,2.1rem);background:#fff}
.slot.filled{border-style:solid;background:var(--kid-yellow)}
.keys{display:grid;grid-template-columns:repeat(auto-fit,minmax(46px,1fr));gap:8px}
.key{aspect-ratio:1;border-radius:14px;border:4px solid var(--kid-ink);background:#fff;box-shadow:0 5px 0 var(--kid-ink);
  font-family:'Fredoka';font-weight:700;font-size:clamp(1.4rem,6vw,1.9rem)}
.key:active{transform:translateY(3px);box-shadow:0 2px 0 var(--kid-ink)}
.key.used{opacity:.3;pointer-events:none}

/* ===== Mate visual ===== */
.dots{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0}
.dot{width:clamp(30px,9vw,42px);height:clamp(30px,9vw,42px);border-radius:50%;background:var(--kid-red);border:3px solid var(--kid-ink)}
.seqrow{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;font-size:clamp(2.2rem,10vw,3.2rem);margin:14px 0}
.seqq{width:clamp(58px,16vw,80px);height:clamp(58px,16vw,80px);border-radius:18px;border:4px dashed var(--kid-ink);background:#fff;display:inline-flex;align-items:center;justify-content:center}

/* ===== aviso de audio ===== */
.audiotip{font-size:.92rem;background:rgba(59,130,246,.12);border:2px solid var(--kid-blue);border-radius:14px;padding:10px 14px;margin-bottom:14px;font-family:'Fredoka';font-weight:500;line-height:1.4}

</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
/* ============ ESTADO ============ */
const DEFAULT_STATE={pin:"1234",geminiKey:"",
 profiles:{
  nino:{name:"Explorador",emoji:"🦖",coins:0,xp:0,streak:0,lastDay:"",days:{},stats:{},map:{unlocked:1,stars:{}},worldWins:{},critters:[],mastery:{},signals:{read:{n:0,slow:0,err:0},math:{n:0,err:0},en:{n:0,err:0},seq:{n:0,err:0}}},
  nina:{name:"Estrella",emoji:"🎧",coins:0,xp:0,streak:0,lastDay:"",days:{},stats:{},best:{}}
 },aiBank:{nina:[]}};
let S=load();
function load(){try{const r=localStorage.getItem("academiaFam2");if(r){const s=JSON.parse(r);const base=JSON.parse(JSON.stringify(DEFAULT_STATE));deepMerge(base,s);return base;}}catch(e){}return JSON.parse(JSON.stringify(DEFAULT_STATE));}
function deepMerge(t,s){for(const k in s){if(s[k]&&typeof s[k]==="object"&&!Array.isArray(s[k])){if(!t[k])t[k]={};deepMerge(t[k],s[k]);}else t[k]=s[k];}}
function save(){localStorage.setItem("academiaFam2",JSON.stringify(S));}
const app=document.getElementById("app");
let current={profile:null};
function prof(){return S.profiles[current.profile];}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function seedFromStr(str){let h=1779033703;for(let i=0;i<str.length;i++){h=Math.imul(h^str.charCodeAt(i),3432918353);h=(h<<13)|(h>>>19);}return h>>>0;}
function mulberry32(a){return function(){a|=0;a=(a+0x6D2B79F5)|0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
function dailyRng(x){return mulberry32(seedFromStr(todayStr()+(x||"")));}
function shuffled(arr,rng){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor((rng?rng():Math.random())*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pick(arr,rng){return arr[Math.floor((rng?rng():Math.random())*arr.length)];}
function rnd(n){return Math.floor(Math.random()*n);}

/* ============ SONIDO + CONFETI ============ */
let AC=null;
function beep(freqs,dur){try{if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();let t=AC.currentTime;
 freqs.forEach(f=>{const o=AC.createOscillator(),g=AC.createGain();o.type="triangle";o.frequency.value=f;o.connect(g);g.connect(AC.destination);
 g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.start(t);o.stop(t+dur);t+=dur*0.6;});}catch(e){}}

/* helpers para construir preguntas */
function mcq(q,ans,hint,fixedOps){
 let ops;
 if(fixedOps)ops=fixedOps.slice();
 else{const set=new Set([ans]);while(set.size<3){const d=ans+(1+rnd(5))*(Math.random()<.5?-1:1);if(d>=0)set.add(d);}ops=[...set].map(String);}
 ops=shuffled(ops);return{q,ops,a:ops.indexOf(String(ans)),hint};}
function enMCQ(pool){const w=pick(pool);return{q:'¿Qué significa "'+w[0]+'"?',ops:shuffled([w[1],...pickN(["perro","casa","sol","agua","rojo","mano","mesa","cinco","gato","leche"].filter(x=>x!==w[1]),2)]),a:-1,word:w[0],pic:w[2]||"🔊",es:w[1],en:true,fixAns:w[1]};}
function pickN(arr,n){return shuffled(arr).slice(0,n);}

/* dominio adaptativo: registra desempeño por tema y decide cuál sale */
function topicMastery(){const p=prof();if(!p.mastery)p.mastery={};return p.mastery;}
function recordTopic(topic,correct){const m=topicMastery();
 if(!m[topic])m[topic]={n:0,ok:0,streak:0};
 m[topic].n++;if(correct){m[topic].ok++;m[topic].streak++;}else m[topic].streak=0;save();}
function weakestTopics(keys,count){
 const m=topicMastery();
 const scored=keys.map(k=>{const s=m[k];const rate=s&&s.n>=3?s.ok/s.n:0.5;const seen=s?s.n:0;
  // peso: prioriza baja tasa de acierto y temas poco vistos
  return{k,w:(1-rate)*2 + (seen<3?1:0) + Math.random()*0.4};});
 scored.sort((a,b)=>b.w-a.w);
 return scored.slice(0,count).map(s=>s.k);}

/* generar una tanda de retos de un tema (IA si hay clave, si no fallback) */
async function buildChallenges(topicKey,n){
 const topic=KID_TOPICS[topicKey];
 if(S.geminiKey){
  try{
   const obj=await geminiJSON('Eres un tutor de primaria. Crea '+n+' preguntas de opción múltiple sobre: '+topic.prompt+'. Cada una con 3 opciones y una sola correcta. Lenguaje español sencillo y frases cortas. Responde SOLO JSON válido sin markdown: {"items":[{"q":"pregunta","ops":["correcta","incorrecta","incorrecta"],"a":0}]} . El índice "a" indica cuál opción es correcta.');
   if(obj.items&&obj.items.length){return obj.items.map(it=>{
    // mezclar opciones para que la correcta no siempre sea la 0
    const correct=it.ops[it.a];const ops=shuffled(it.ops);
    return{q:it.q,ops,a:ops.indexOf(correct),word:topic.en?firstEnWord(it.q):null};});}
  }catch(e){/* cae al fallback */}
 }
 // fallback fijo
 const out=[];for(let i=0;i<n;i++){const f=topic.fallback();
  if(f.a===-1&&f.fixAns!==undefined)f.a=f.ops.indexOf(f.fixAns);
  out.push(f);}
 return out;}
function firstEnWord(q){const m=q.match(/"([A-Za-z]+)"/);return m?m[1]:null;}

function touchDay(){const p=prof(),t=todayStr();
 if(p.lastDay!==t){const y=new Date();y.setDate(y.getDate()-1);
  const ys=y.getFullYear()+"-"+String(y.getMonth()+1).padStart(2,"0")+"-"+String(y.getDate()).padStart(2,"0");
  p.streak=(p.lastDay===ys)?p.streak+1:1;p.lastDay=t;}
 if(!p.days[t])p.days[t]={ex:0,ok:0,sec:0,missions:[],games:0};
 return p.days[t];}
function recordAnswer(subject,correct,secs){const p=prof(),d=touchDay();
 if(!p.stats[subject])p.stats[subject]={attempts:0,correct:0,sec:0};
 p.stats[subject].attempts++;d.ex++;p.stats[subject].sec+=(secs||0);d.sec+=(secs||0);
 if(correct){p.stats[subject].correct++;d.ok++;p.coins+=2;p.xp+=5;}else p.xp+=1;
 // señales de apoyo (solo niño): tiempos altos y errores por área
 if(current.profile==="nino"){
  if(!p.signals)p.signals={read:{n:0,slow:0,err:0},math:{n:0,err:0},en:{n:0,err:0},seq:{n:0,err:0}};
  const readSubj=["Comprensión","Letras"].includes(subject);
  const mathSubj=["Mate","Problemas","Números"].includes(subject);
  const enSubj=subject==="Inglés";
  const seqSubj=["Secuencias","Lógica"].includes(subject);
  if(readSubj){p.signals.read.n++;if(secs>=25)p.signals.read.slow++;if(!correct)p.signals.read.err++;}
  if(mathSubj){p.signals.math.n++;if(!correct)p.signals.math.err++;}
  if(enSubj){p.signals.en.n++;if(!correct)p.signals.en.err++;d.enDone=true;}
  if(seqSubj){p.signals.seq.n++;if(!correct)p.signals.seq.err++;}
 }
 save();}

function screenKidMap(){setTheme("kid");

  const done=(p.worldWins&&p.worldWins[w.id])||0;
  return '<button class="kbtn '+w.color+'" style="text-align:left;display:flex;align-items:center;gap:14px" onclick="openWorld(\''+w.id+'\')">'
   +'<span style="font-size:clamp(2.2rem,10vw,2.8rem)">'+w.ic+'</span>'
   +'<span style="flex:1"><span style="font-size:clamp(1.1rem,5vw,1.35rem)">'+w.nm+'</span><br><span style="font-size:.78rem;opacity:.85;font-weight:500">'+w.desc+(done?' · ✅ '+done:'')+'</span></span></button>';

 +'<div class="card" style="display:flex;align-items:center;gap:14px;padding:16px">'
 +'<div style="font-size:clamp(3rem,15vw,4rem)" onclick="screenCritters()">'+pet.e+'</div>'

 +missionsHTML()
 +'<p style="font-size:1.05rem;margin:4px 2px 10px;font-family:Fredoka;font-weight:600">Elige un mundo para explorar 🌍</p>'

function lockedMsg(){}
function openWorld(id){
 const w=KID_WORLDS.find(x=>x.id===id);curNode=id;
 if(w.special==="stories")return screenStoryPick();
 if(w.special==="writing")return screenWritingPick();
 if(w.special==="games")return screenGamesPick();
 // mundo de retos infinitos adaptativos
 playTopics(w.nm,w.topics,{perTopic:4,topicsPerSession:2,total:8});}
function bumpWorld(id){const p=prof();if(!p.worldWins)p.worldWins={};p.worldWins[id]=(p.worldWins[id]||0)+1;save();}

/* ============ JUEGO: GLOBOS ============ */
let BL={};
function balloonQuestion(mode){
 if(mode==="ingles"){const w=pick(EN_KID);return{q:'¿Qué significa "'+w[0].toUpperCase()+'"?',ans:w[1],pool:EN_KID.map(x=>x[1])};}
 const r=Math.random();
 if(r<0.34){const a=1+rnd(9),b=1+rnd(9);return{q:a+" + "+b+" = ?",ans:String(a+b),pool:null,num:a+b};}
 if(r<0.6){const a=3+rnd(14),b=1+rnd(a-1);return{q:a+" − "+b+" = ?",ans:String(a-b),pool:null,num:a-b};}
 const v=pick(VOCAL_WORDS);return{q:"¿Con qué vocal empieza "+v[1]+"?",ans:v[0],pool:["A","E","I","O","U"]};}
function gameBalloons(mode){setTheme("kid");
 BL={mode,round:0,ok:0,total:6};nextBalloonRound();}
function nextBalloonRound(){
 if(BL.round>=BL.total){recordAnswer(BL.mode==="ingles"?"Inglés":"Globos",true,0);return nodeWin(starsFor(BL.ok,BL.total),"Globos");}
 const Q=balloonQuestion(BL.mode);BL.cur=Q;
 let answers;
 if(Q.pool){answers=shuffled(Q.pool.filter(x=>x!==Q.ans)).slice(0,3);answers.push(Q.ans);}
 else{const set=new Set([Q.num]);while(set.size<4){const d=Q.num+1+rnd(4)*(Math.random()<.5?-1:1);if(d>=0)set.add(d);}answers=[...set].map(String);}
 answers=shuffled(answers);
 const colors=["#FF6B6B","#3B82F6","#3EC97C","#A78BFA","#F59E0B"];
 render(topbar("screenKidMap()")
 +'<div class="progressdots">'+Array.from({length:BL.total},(x,i)=>'<i class="'+(i<BL.round?"on":"")+'"></i>').join("")+'</div>'
 +'<div class="bigq center">'+esc(Q.q)+'</div>'
 +'<div id="sky"></div>'
 +'<p class="center" style="margin-top:12px;font-size:1.05rem">💥 ¡Revienta el globo correcto!</p>');
 const sky=document.getElementById("sky");
 answers.forEach((a,i)=>{
  const b=document.createElement("div");b.className="balloon";b.textContent=a;
  b.style.background=colors[i%colors.length];
  b.style.left=(4+i*24)+"%";
  b.style.animationDuration=(7+Math.random()*4)+"s";
  b.style.animationDelay=(i*0.9)+"s";
  b.onclick=()=>popBalloon(b,a===BL.cur.ans);
  sky.appendChild(b);});
 BL.timer=setTimeout(()=>{if(document.getElementById("sky")){toast("¡Se escaparon! 🎈 La respuesta era "+BL.cur.ans,false,1800);sNO();recordAnswer(BL.mode==="ingles"?"Inglés":"Números",false,12);BL.round++;setTimeout(nextBalloonRound,1700);}},12500);}
function popBalloon(el,ok){
 if(BL.done)return;
 if(ok){BL.done=true;clearTimeout(BL.timer);el.classList.add("pop");sOK();confetti(10);
  recordAnswer(BL.mode==="ingles"?"Inglés":"Números",true,8);BL.ok++;BL.round++;
  toast("¡Correcto! +2 🪙",true,1000);
  setTimeout(()=>{BL.done=false;nextBalloonRound();},1000);}
 else{el.style.animationPlayState="paused";el.style.opacity=".4";sNO();
  recordAnswer(BL.mode==="ingles"?"Inglés":"Números",false,8);}}

let MM={};
function gameMemory(kind){setTheme("kid");
 let pares;
 if(kind==="meses"){pares=shuffled(MESES).slice(0,6).map(p=>[p[0],p[1]]);}
 else{pares=[];const used=new Set();while(pares.length<6){const n=1+rnd(9);if(!used.has(n)){used.add(n);pares.push([String(n),"🔵".repeat(n)]);}}}
 const cards=shuffled(pares.flatMap((p,i)=>[{id:i,txt:p[0]},{id:i,txt:p[1]}]));
 MM={cards,first:null,lock:false,found:0,tries:0,kind};
 render(topbar("screenKidMap()")
 +'<h2 style="font-size:1.4rem;margin-bottom:4px">🃏 ¡Encuentra las parejas!</h2>'
 +'<p style="margin-bottom:14px;font-size:1.05rem">'+(kind==="meses"?"Mes en español + mes en inglés":"Número + sus puntos")+'</p>'
 +'<div class="memgrid">'+cards.map((c,k)=>'<div class="mem" id="mm'+k+'" onclick="flipMem('+k+')"><div class="in"><div class="f">❓</div><div class="b">'+esc(c.txt)+'</div></div></div>').join("")+'</div>');}
function flipMem(k){
 if(MM.lock)return;const el=document.getElementById("mm"+k);
 if(el.classList.contains("flip"))return;
 el.classList.add("flip");beep([440],.08);
 if(MM.first===null){MM.first=k;return;}
 const a=MM.cards[MM.first],b=MM.cards[k],elA=document.getElementById("mm"+MM.first);
 MM.tries++;MM.lock=true;
 if(a.id===b.id){MM.found++;sOK();el.classList.add("ok");elA.classList.add("ok");
  recordAnswer(MM.kind==="meses"?"Meses":"Números",true,6);
  MM.first=null;MM.lock=false;
  if(MM.found===6){const st=MM.tries<=8?3:MM.tries<=11?2:1;setTimeout(()=>nodeWin(st,"Memoria"),700);}}
 else{sNO();recordAnswer(MM.kind==="meses"?"Meses":"Números",false,6);
  setTimeout(()=>{el.classList.remove("flip");elA.classList.remove("flip");MM.first=null;MM.lock=false;},900);}}

/* Toma uno o varios temas, pide retos (IA o fallback) y los juega con audio si es inglés. */
let CH={};
async function playTopics(label,topicKeys,opts){
 opts=opts||{};
 setTheme("kid");
 render(topbar("screenKidMap()")
  +'<div class="card center" style="padding:40px"><div style="font-size:3rem" class="spin">⏳</div>'
  +'<h2 style="margin-top:10px">Preparando tus retos…</h2>'
  +'<p class="mut">'+(S.geminiKey?"Creando preguntas nuevas con IA ✨":"Cargando retos")+'</p></div>');
 // elige los temas más débiles si son varios
 const chosen = topicKeys.length>1 ? weakestTopics(topicKeys, Math.min(opts.topicsPerSession||2,topicKeys.length)) : topicKeys;
 let items=[];
 for(const tk of chosen){
  const part=await buildChallenges(tk, opts.perTopic||4);
  part.forEach(it=>it._topic=tk);
  items=items.concat(part);
 }
 items=shuffled(items).slice(0,opts.total||8);
 if(!items.length){toast("No se pudo cargar. Intenta de nuevo.",false,2000);return screenKidMap();}
 CH={label,items,i:0,ok:0,wrongTopics:{}};
 renderCH();}
function renderCH(){
 const it=CH.items[CH.i];
 if(!it)return finishCH();
 const order=it.ops.map((o,k)=>({o,k}));
 const shown=shuffled(order);CH.order=shown;CH.correctK=it.a;
 const isEN=it.word||KID_TOPICS[it._topic]&&KID_TOPICS[it._topic].en;
 const topic=KID_TOPICS[it._topic];
 const head=topic?topic.emoji+" "+topic.name:CH.label;
 render(topbar("screenKidMap()")
 +'<div class="progressdots">'+dots(CH.items.length,CH.i)+'</div>'
 +'<p class="center" style="font-family:Fredoka;font-weight:600;margin-bottom:8px">'+head+' · '+(CH.i+1)+'/'+CH.items.length+'</p>'
 +(isEN&&it.pic?'<div class="bigpic">'+it.pic+'</div>':'')
 +'<div class="bigq center">'+esc(it.q)+'</div>'
 +(isEN&&it.word?'<button class="speaker" onclick="speakEN(\''+esc(it.word).replace(/'/g,"")+'\')"><span class="ic">🔊</span> Escuchar en inglés</button>'
   :'<button class="speaker small" onclick="speakES(\''+esc(it.q).replace(/'/g,"\\'")+'\')">🔊 Leer pregunta</button>')
 +'<div class="choices2">'+shown.map((s,vi)=>'<button class="kbtn white" style="font-size:clamp(1.15rem,5vw,1.45rem)" onclick="ansCH('+vi+')">'+esc(s.o)+'</button>').join("")+'</div>');
 if(isEN&&it.word)setTimeout(()=>speakEN(it.word.replace(/'/g,"")),350);}
function ansCH(vi){
 const it=CH.items[CH.i];
 const ok=CH.order[vi].k===CH.correctK;
 const subj=(KID_TOPICS[it._topic]&&KID_TOPICS[it._topic].en)?"Inglés":(KID_TOPICS[it._topic]?KID_TOPICS[it._topic].name:CH.label);
 recordAnswer(subj,ok,it.word?12:15);
 if(it._topic)recordTopic(it._topic,ok);
 if(ok){sOK();confetti(8);if(it.word)speakEN(it.word.replace(/'/g,""));toast("¡Correcto! 🎉",true,1000);CH.ok++;}
 else{sNO();CH.wrongTopics[it._topic]=(CH.wrongTopics[it._topic]||0)+1;
  toast("Era: "+it.ops[it.a],false,1800);}
 CH.i++;setTimeout(renderCH,ok?1000:1800);}
async function finishCH(){
 // refuerzo adaptativo: si falló mucho un tema, añade 2 retos extra de ese tema al final
 const worst=Object.entries(CH.wrongTopics).sort((a,b)=>b[1]-a[1])[0];
 if(worst&&worst[1]>=2&&!CH.reinforced){
  CH.reinforced=true;
  toast("💪 ¡Vamos a practicar "+(KID_TOPICS[worst[0]]?KID_TOPICS[worst[0]].name:"esto")+" un poco más!",false,2200);
  const extra=await buildChallenges(worst[0],2);extra.forEach(it=>it._topic=worst[0]);
  CH.items=CH.items.concat(extra);
  return setTimeout(renderCH,2200);
 }
 nodeWin(starsFor(CH.ok,CH.items.length),CH.label);}

let RB={};
function gameRobot(startLvl){setTheme("kid");RB={lvl:startLvl,cmds:[],wins:0};renderRobot();}
function renderRobot(){
 const L=ROBOT_LEVELS[RB.lvl%ROBOT_LEVELS.length];
 let cells="";
 for(let y=0;y<L.h;y++)for(let x=0;x<L.w;x++){
  let c="";
  if(x===L.start[0]&&y===L.start[1])c="🤖";
  else if(x===L.goal[0]&&y===L.goal[1])c="⭐";
  else if(L.walls.some(w=>w[0]===x&&w[1]===y))c="🪨";
  cells+='<div class="cell" id="c'+x+'_'+y+'">'+c+'</div>';}
 render(topbar("screenKidMap()")
 +'<h2 style="font-size:1.4rem">🤖 Programa al robot</h2>'
 +'<p style="margin:4px 0 8px;font-size:1.05rem">Llévalo a la ⭐ — Pista: '+L.hint+'</p>'
 +'<div class="robotgrid" style="grid-template-columns:repeat('+L.w+',1fr)">'+cells+'</div>'
 +'<div class="cmdrow" id="cmdrow"></div>'
 +'<div class="cmdbtns"><button onclick="addCmd(0)">⬆️</button><button onclick="addCmd(1)">⬇️</button><button onclick="addCmd(2)">⬅️</button><button onclick="addCmd(3)">➡️</button></div>'
 +'<button class="kbtn green" onclick="runRobot()">▶️ ¡EJECUTAR!</button>'
 +'<button class="kbtn white" onclick="RB.cmds=[];drawCmds()">🧽 Borrar programa</button>');
 drawCmds();}
const ARROWS=["⬆️","⬇️","⬅️","➡️"];
function addCmd(i){if(RB.cmds.length<12){RB.cmds.push(i);beep([500+i*60],.08);drawCmds();}}
function drawCmds(){document.getElementById("cmdrow").innerHTML=RB.cmds.map(c=>'<span class="cmd">'+ARROWS[c]+'</span>').join("")||'<span style="opacity:.5;font-size:1rem;padding:8px">Toca las flechas para armar tu programa…</span>';}
function runRobot(){
 const L=ROBOT_LEVELS[RB.lvl%ROBOT_LEVELS.length];
 let[x,y]=L.start.slice();let i=0;
 const step=()=>{
  if(i>=RB.cmds.length)return finish();
  const c=RB.cmds[i++];
  const nx=x+(c===3?1:c===2?-1:0),ny=y+(c===1?1:c===0?-1:0);
  if(nx<0||ny<0||nx>=L.w||ny>=L.h||L.walls.some(w=>w[0]===nx&&w[1]===ny)){

 clearInterval(QZ.tick);
 const q=QZ.qs[QZ.i];
 if(!q)return quizEnd();
 QZ.order=shuffled(q.ops.map((o,i)=>({o,i})));
 QZ.timeLeft=100;
 const qtext=q.code?'<pre style="white-space:pre-wrap;background:#141127;border:1px solid #322B52;padding:14px;border-radius:14px;font-size:1rem;line-height:1.5">'+esc(q.q)+'</pre>':'<div class="bigq">'+esc(q.q)+'</div>';

 QZ.tick=setInterval(()=>{QZ.timeLeft-=1.25;
  const el=document.getElementById("tb");if(el)el.style.width=Math.max(0,QZ.timeLeft)+"%";
  if(QZ.timeLeft<=0){clearInterval(QZ.tick);timeUp();}},250);}
function timeUp(){
 const q=QZ.qs[QZ.i];QZ.combo=0;sNO();
 recordAnswer(QZ.subject,false,20);

function ansQ(k){
 clearInterval(QZ.tick);
 const q=QZ.qs[QZ.i],ok=QZ.order[k].i===q.a;

 recordAnswer(QZ.subject,ok,secs);
 document.querySelectorAll(".opt").forEach(b=>b.disabled=true);
 if(ok){QZ.ok++;QZ.combo++;QZ.maxCombo=Math.max(QZ.maxCombo,QZ.combo);
  const mult=Math.min(QZ.combo,4);

  save();sOK();
  if(QZ.combo>=2){const c=document.createElement("div");c.className="combo";c.textContent="⚡ COMBO x"+QZ.combo;document.body.appendChild(c);setTimeout(()=>c.remove(),900);}

 else{QZ.combo=0;sNO();toast("Era: "+esc(q.ops[q.a]),false,2000);}
 QZ.i++;setTimeout(renderQ,ok?950:1950);}

async function geminiJSON(promptText){
 const models=["gemini-2.0-flash","gemini-1.5-flash-latest","gemini-1.5-flash"];
 let res=null;
 for(const m of models){
  res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+m+":generateContent?key="+encodeURIComponent(S.geminiKey),
   {method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts:[{text:promptText}]}],generationConfig:{temperature:0.9}})});
  if(res.ok)break;if(res.status!==404)break;}
 if(!res||!res.ok)throw new Error("Error de la API ("+(res?res.status:"red")+"). Revisa la clave en el panel de padres.");
 const data=await res.json();
 let txt=(data.candidates&&data.candidates[0].content.parts.map(p=>p.text||"").join(""))||"";
 txt=txt.replace(/```json|```/g,"").trim();
 const a=txt.indexOf("{"),b=txt.lastIndexOf("}");
 return JSON.parse(txt.slice(a,b+1));}

 const checkArea=(o,label,hint)=>{
  if(!o||o.n<6){items.push('<li><span class="tag" style="background:rgba(100,116,139,.12);color:#64748B">Sin datos aún</span> '+label+' <span class="mut">(necesita más práctica para evaluar)</span></li>');return;}
  const e=Math.round(o.err/o.n*100);
  const slow=o.slow?Math.round(o.slow/o.n*100):0;
  let color,word;
  if(e>=45){color="#DC2626";word="Atención";}else if(e>=25){color="#D97706";word="En proceso";}else{color="#16A34A";word="Bien";}
  items.push('<li><span class="tag" style="background:'+color+'22;color:'+color+'">'+word+'</span> <b>'+label+'</b>: '+e+'% de errores'+(slow>30?', y lee/responde despacio ('+slow+'% lento)':'')+'. <span class="mut">'+hint+'</span></li>');};
 checkArea(s.read,"Lectura y letras","Si hay muchos errores o lentitud constante, vale la pena que un profesional evalúe la lectura.");
 checkArea(s.math,"Matemáticas","Refuerza contando objetos reales antes de los números abstractos.");
 checkArea(s.en,"Inglés","Repetir el audio en voz alta cada día acelera mucho el progreso.");
 checkArea(s.seq,"Lógica y patrones","Los patrones desarrollan el razonamiento; juéguenlos juntos.");
 return '<details style="margin-top:6px"><summary style="cursor:pointer;font-weight:800;color:var(--par-acc)">🔎 Señales de apoyo (orientativas)</summary>'
 +'<div style="background:#FEF9F3;border:1px solid #F0E0CC;border-radius:12px;padding:14px;margin-top:10px">'
 +'<p class="mut" style="margin-bottom:10px;font-size:.85rem"><b>Importante:</b> esto NO es un diagnóstico. Es solo un resumen de cómo le va por área para que tú decidas dónde reforzar o si consultar a un docente o especialista. Las dificultades de aprendizaje solo las diagnostica un profesional.</p>'
 +'<ul style="margin-left:18px;line-height:1.7;font-size:.92rem">'+items.join("")+'</ul></div></details>';}
function screenParentDash(){setTheme("parent");
 render('<div class="topbar"><button class="back" onclick="screenStart()">←</button><b style="font-size:1.1rem">Panel de padres</b></div>'
 +profileReport("nino")+profileReport("nina")
 +'<div class="card"><h3>⚙️ Configuración</h3>'
 +'<p class="mut" style="margin:12px 0 4px">Clave de API de Gemini (vive solo en este dispositivo)</p>'
 +'<input type="password" id="gkey" placeholder="AIza..." value="'+esc(S.geminiKey)+'">'
 +'<p class="mut" style="margin:6px 0 4px">Cambiar PIN</p><input type="password" id="newpin" inputmode="numeric" placeholder="Nuevo PIN (opcional)">'
 +'<p class="mut" style="margin:6px 0 4px">Nombres</p>'
 +'<input type="text" id="nName" value="'+esc(S.profiles.nino.name)+'" placeholder="Nombre del niño">'
 +'<input type="text" id="aName" value="'+esc(S.profiles.nina.name)+'" placeholder="Nombre de la niña">'
 +'<button class="pbtn" onclick="saveSettings()">Guardar cambios</button><span id="fb"></span>'
 +'<p class="tip">💡 Clave gratuita: <b>aistudio.google.com</b> → Get API key. Nunca la escribas dentro del archivo ni la subas a GitHub.</p></div>'
 +'<div class="card"><h3>🗂️ Datos</h3><p class="mut" style="margin:8px 0">El progreso se guarda en cada dispositivo. Respáldalo o muévelo:</p>'
 +'<button class="pbtn ghost" onclick="exportData()">⬇️ Exportar respaldo</button>'
 +'<button class="pbtn ghost" onclick="document.getElementById(\'impfile\').click()">⬆️ Importar</button>'
 +'<input type="file" id="impfile" class="hidden" accept=".json" onchange="importData(event)">'
 +'<button class="pbtn danger" onclick="if(confirm(\'¿Borrar TODO el progreso?\')){localStorage.removeItem(\'academiaFam2\');location.reload();}">🗑️ Reiniciar todo</button>'
 +'<p class="mut" style="margin-top:10px">Contenido creado por IA: '+S.aiBank.nina.length+' elementos</p></div>');}
function saveSettings(){
 S.geminiKey=document.getElementById("gkey").value.trim();
 const np=document.getElementById("newpin").value.trim();if(np)S.pin=np;
 S.profiles.nino.name=document.getElementById("nName").value.trim()||"Explorador";
 S.profiles.nina.name=document.getElementById("aName").value.trim()||"Estrella";
 save();document.getElementById("fb").innerHTML=' <b style="color:var(--par-acc)">✓ Guardado</b>';}
function exportData(){
 const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
 const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="academia-respaldo-"+todayStr()+".json";a.click();}
function importData(ev){
 const f=ev.target.files[0];if(!f)return;
 const r=new FileReader();
 r.onload=()=>{try{const base=JSON.parse(JSON.stringify(DEFAULT_STATE));deepMerge(base,JSON.parse(r.result));S=base;save();screenParentDash();}catch(e){alert("Archivo no válido");}};
 r.readAsText(f);}

/* ============ ARRANQUE ============ */
screenStart();
</script>
</body>
</html>
